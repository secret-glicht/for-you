<!DOCTYPE html>
<html>
<head>
  <title>For Rika 💖</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 100px;
    }

    h1 {
      font-size: 40px;
      color: #ff69b4;
    }

    p {
      font-size: 20px;
      margin: 20px;
    }

    .heart {
      font-size: 30px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% {opacity: 1;}
      50% {opacity: 0.3;}
      100% {opacity: 1;}
    }
  </style>
</head>

<body>

  <h1>For Rika 💖</h1>

  <p class="heart">❤️ ✨ ❤️ ✨ ❤️</p>

  <p>
    Happy Birthday Rika 🎉🥳 <br><br>
    Semoga panjang umur, sehat selalu,<br>
    dan semua impianmu tercapai 💕<br><br>
    Terima kasih sudah jadi orang<br>
    yang selalu bikin hari lebih cerah ✨
  </p>

  <p class="heart">✨ 💖 ✨ 💖 ✨</p>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
    }

    .slide {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      animation: fade 1s;
    }

    img {
      width: 80%;
      max-width: 300px;
      border-radius: 20px;
    }

    .text {
      margin-top: 15px;
      font-size: 20px;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<div class="slide">
  <h1>🎉 Happy Birthday 🎉</h1>
  <div class="text">Hari ini hari spesial kamu 💖</div>
</div>

<div class="slide">
  <img src="https://i.imgur.com/8Km9tLL.jpg">
  <div class="text">Kamu itu berharga banget ✨</div>
</div>

<div class="slide">
  <img src="https://i.imgur.com/5XjKX3B.jpg">
  <div class="text">Semoga semua impianmu tercapai 🥳</div>
</div>

<div class="slide">
  <h2>I Wish You All The Best 💕</h2>
</div>

<script>
let slides = document.getElementsByClassName("slide");
let i = 0;

function showSlides() {
  for (let s of slides) {
    s.style.display = "none";
  }

  slides[i].style.display = "flex";
  i++;

  if (i >= slides.length) i = 0;

  setTimeout(showSlides, 3000);
}

showSlides();
</script>

</body>
</html>

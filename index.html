<!DOCTYPE html>
<html>
<head>
<title>For You 💖</title>

<style>
body{
  background: linear-gradient(black,#1a001a);
  color:white;
  text-align:center;
  font-family:Arial;
  overflow:hidden;
}

/* slide */
.slide{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* foto */
img{
  width:250px;
  border-radius:20px;
  box-shadow:0 0 20px pink;
}

/* teks */
.text{
  margin-top:15px;
  font-size:20px;
  animation: fade 2s;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

/* hati jatuh */
.heart{
  position:fixed;
  top:-10px;
  color:#ff69b4;
  animation: jatuh linear infinite;
}

@keyframes jatuh{
  to{transform:translateY(100vh);}
}

/* tombol */
button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:pink;
  color:black;
  font-size:16px;
}
</style>

</head>

<body>

<!-- tombol musik -->
<button onclick="playMusic()">💖 Klik Aku 💖</button>

<audio id="musik" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<!-- SLIDES -->

<div class="slide">
  <h1>🎉 Happy Birthday 🎉</h1>
  <div class="text">
  Selamat ulang tahun 💖<br><br>
  terima kasih sudah bertahan sejauh ini,<br>
  kamu kuat banget ✨
  </div>
</div>

<div class="slide">
  <img src="foto1.jpg">
  <div class="text">aku harap kamu selalu bahagia 💕</div>
</div>

<div class="slide">
  <img src="foto2.jpg">
  <div class="text">jangan pernah ngerasa sendirian ya ✨</div>
</div>

<div class="slide">
  <img src="foto3.jpg">
  <div class="text">karena kamu sangat berarti 💖</div>
</div>

<div class="slide">
  <h2>I Wish You All The Best 💕</h2>
</div>

<script>
// slideshow
let slides=document.getElementsByClassName("slide");
let i=0;

function showSlides(){
  for(let s of slides){s.style.display="none";}
  slides[i].style.display="flex";
  i++;
  if(i>=slides.length){i=0;}
  setTimeout(showSlides,3000);
}
showSlides();

// musik
function playMusic(){
  document.getElementById("musik").play();
}

// hati jatuh
setInterval(()=>{
  let heart=document.createElement("div");
  heart.innerHTML="💖";
  heart.className="heart";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),5000);
},300);
</script>

</body>
</html>

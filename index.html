<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }
    /* STAR BACKGROUND */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://i.imgur.com/3JQZQZC.png');
      animation: moveStars 20s linear infinite;
      opacity: 0.3;
    }
    @keyframes moveStars {
      from {background-position: 0 0;}
      to {background-position: 1000px 1000px;}
    }
    /* START SCREEN */
    .start {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: rgba(0,0,0,0.7);
      z-index: 10;
    }
    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      background: pink;
      color: black;
      font-weight: bold;
    }
    /* SLIDES */
    .slide {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      animation: fade 1.5s ease;
    }
    img {
      width: 80%;
      max-width: 320px;
      border-radius: 20px;
      animation: zoom 2s ease;
      box-shadow: 0 0 20px white;
    }
    @keyframes zoom {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }
    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    .text {
      margin-top: 15px;
      font-size: 20px;
      opacity: 0;
      animation: appear 2s forwards;
    }
    @keyframes appear {
      to {opacity: 1;}
    }
    .title {
      font-size: 30px;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from {text-shadow: 0 0 10px white;}
      to {text-shadow: 0 0 20px pink;}
    }
  </style>
</head>
<body>
<div class="stars"></div>
<!-- START SCREEN -->
<div class="start" id="start">
  <h1>💖 A Special Surprise</h1>
  <button onclick="start()">Klik untuk buka</button>
</div>
<!-- MUSIK -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<!-- SLIDES -->
<div class="slide" id="s1">
  <div class="title">🎉 Happy Birthday 🎉</div>
  <div class="text">Semoga hari ini jadi hari terbaik kamu 💖</div>
</div>
<div class="slide" id="s2">
  <img src="https://i.imgur.com/8Km9tLL.jpg">
  <div class="text">Semoga panjang umur & selalu bahagia 🥳</div>
</div>
<div class="slide" id="s3">
  <img src="https://i.imgur.com/5XjKX3B.jpg">
  <div class="text">Kamu orang yang sangat spesial ✨</div>
</div>
<script>
let slides = document.getElementsByClassName("slide");
let i = 0;
function start() {
  document.getElementById("start").style.display = "none";
  document.getElementById("music").play();
  showSlides();
}
function showSlides() {
  for (let s of slides) {
    s.style.display = "none";
  }
  slides[i].style.display = "flex";
  i++;
  if (i >= slides.length) i = 0;
  setTimeout(showSlides, 4000);
}
</script>
</body>
</html>
